<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One People Demo App</title>
  <style>
    :root {
      --ink: #16324f;
      --ink-soft: #60758a;
      --teal: #2aa6ba;
      --blue: #4f80e1;
      --deep-blue: #2854ae;
      --orange: #ffb67a;
      --yellow: #ffe39d;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(22, 50, 79, 0.08);
      --phone-shell: #0f1724;
      --phone-bottom: rgba(255, 255, 255, 0.86);
      --success: #1ea672;
      --danger: #dc5572;
      --warning: #ca7e37;
      --shadow: 0 30px 80px rgba(20, 47, 81, 0.16);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(79, 128, 225, 0.24), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255, 182, 122, 0.22), transparent 24%),
        linear-gradient(135deg, #f7fcff 0%, #eef8fb 48%, #fff9f0 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .device-shell {
      width: min(100%, 430px);
      padding: 16px;
      border-radius: 44px;
      background: linear-gradient(180deg, #1a2432, #0f1724 62%, #162130);
      box-shadow: 0 38px 90px rgba(8, 16, 26, 0.24);
    }

    .notch {
      width: 118px;
      height: 28px;
      margin: 0 auto 12px;
      border-radius: 999px;
      background: rgba(5, 9, 14, 0.96);
    }

    .screen {
      position: relative;
      height: min(844px, calc(100vh - 86px));
      min-height: 720px;
      overflow: hidden;
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at top right, rgba(79, 128, 225, 0.2), transparent 30%),
        radial-gradient(circle at bottom left, rgba(255, 182, 122, 0.16), transparent 24%),
        linear-gradient(135deg, #f7fcff 0%, #eef9fb 48%, #fffaf2 100%);
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px 8px;
      font-size: 13px;
      font-weight: 800;
      color: #0d1f37;
    }

    .screen-body {
      height: calc(100% - 70px);
      overflow: auto;
      padding: 6px 18px 108px;
      scrollbar-width: none;
    }

    .screen-body::-webkit-scrollbar {
      display: none;
    }

    .tabbar {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 12px 10px;
      border-radius: 28px;
      background: var(--phone-bottom);
      box-shadow: 0 18px 36px rgba(20, 47, 81, 0.12);
      backdrop-filter: blur(18px);
    }

    .tabbar.hidden {
      display: none;
    }

    .tab {
      appearance: none;
      border: 0;
      background: transparent;
      color: rgba(22, 50, 79, 0.46);
      display: grid;
      gap: 5px;
      justify-items: center;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      padding: 4px 0;
    }

    .tab-icon {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 15px;
    }

    .tab.active {
      color: var(--teal);
    }

    .tab.active .tab-icon {
      background: rgba(42, 166, 186, 0.12);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 22px;
      border-radius: 30px;
      color: #fff;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.16), transparent 36%),
        linear-gradient(135deg, rgba(42,166,186,0.98), rgba(79,128,225,0.96));
      box-shadow: 0 24px 42px rgba(42, 166, 186, 0.18);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      top: -60px;
      right: -50px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
    }

    .hero small {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.9;
    }

    .hero h1,
    .hero h2,
    .screen-title {
      margin: 0;
      letter-spacing: -0.04em;
      line-height: 0.98;
    }

    .hero h1 {
      font-size: 34px;
    }

    .hero p {
      margin: 10px 0 0;
      color: rgba(255,255,255,0.86);
      font-size: 14px;
      line-height: 1.55;
    }

    .identity {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-top: 18px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.26);
      border: 3px solid rgba(255,255,255,0.4);
      display: grid;
      place-items: center;
      font-size: 26px;
      flex: 0 0 auto;
    }

    .card {
      border-radius: 26px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: 0 16px 28px rgba(20, 47, 81, 0.08);
      backdrop-filter: blur(14px);
      padding: 18px;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .check-card {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }

    .primary-btn,
    .secondary-btn {
      appearance: none;
      border: 0;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      border-radius: 18px;
      padding: 15px 16px;
      width: 100%;
    }

    .primary-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 18px 28px rgba(42, 166, 186, 0.2);
    }

    .secondary-btn {
      color: var(--teal);
      background: rgba(42, 166, 186, 0.1);
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .shortcut {
      appearance: none;
      border: 0;
      background: transparent;
      font: inherit;
      cursor: pointer;
      display: grid;
      gap: 8px;
      justify-items: center;
      text-align: center;
      color: var(--ink);
      font-size: 11px;
      font-weight: 800;
      padding: 0;
    }

    .shortcut-badge {
      width: 66px;
      height: 66px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 24px;
      box-shadow: 0 14px 22px rgba(20, 47, 81, 0.08);
    }

    .banner {
      border-radius: 26px;
      padding: 20px;
      color: #fff;
      background: linear-gradient(135deg, rgba(42,166,186,0.98), rgba(111,215,215,0.96));
    }

    .banner h3 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .banner p {
      margin: 0;
      font-size: 13px;
      line-height: 1.55;
      color: rgba(255,255,255,0.85);
    }

    .screen-title {
      font-size: 30px;
      margin-bottom: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .back-btn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 0;
      background: rgba(255,255,255,0.72);
      cursor: pointer;
      font-size: 16px;
      color: var(--ink);
      box-shadow: 0 10px 18px rgba(20, 47, 81, 0.08);
    }

    .segment {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
    }

    .segment span {
      padding: 12px 14px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      color: rgba(22, 50, 79, 0.52);
    }

    .segment .active {
      color: var(--teal);
      border-bottom: 3px solid var(--teal);
      background: rgba(255,255,255,0.92);
    }

    .list-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(22, 50, 79, 0.07);
      font-size: 13px;
      line-height: 1.45;
    }

    .list-line:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .list-line b {
      display: block;
      font-size: 14px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border-radius: 20px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(22, 50, 79, 0.06);
      padding: 16px;
    }

    .metric strong {
      display: block;
      font-size: 13px;
    }

    .metric b {
      display: block;
      margin-top: 6px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--ink-soft);
      font-size: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tag.success {
      color: var(--success);
      background: rgba(30, 166, 114, 0.12);
    }

    .tag.pending {
      color: var(--warning);
      background: rgba(202, 126, 55, 0.13);
    }

    .tag.danger {
      color: var(--danger);
      background: rgba(220, 85, 114, 0.12);
    }

    .chat {
      display: grid;
      gap: 12px;
    }

    .bubble {
      max-width: 84%;
      padding: 14px 16px;
      border-radius: 20px;
      line-height: 1.55;
      font-size: 13px;
      box-shadow: 0 10px 24px rgba(20, 47, 81, 0.08);
    }

    .bubble.user {
      margin-left: auto;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      border-bottom-right-radius: 8px;
    }

    .bubble.assistant {
      color: var(--ink);
      background: rgba(255,255,255,0.92);
      border-bottom-left-radius: 8px;
    }

    .field,
    .server-card {
      border-radius: 20px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(22, 50, 79, 0.08);
      padding: 14px 16px;
      color: var(--ink-soft);
      font-size: 14px;
    }

    .server-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 800;
      color: var(--teal);
    }

    .server-note {
      margin-top: 7px;
      font-size: 12px;
      line-height: 1.5;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: end;
      justify-content: center;
      background: rgba(15, 23, 36, 0.26);
      backdrop-filter: blur(4px);
      padding: 16px;
    }

    .overlay.active {
      display: flex;
    }

    .sheet {
      width: 100%;
      max-height: 88%;
      overflow: auto;
      border-radius: 28px 28px 24px 24px;
      background: var(--surface-strong);
      box-shadow: 0 24px 48px rgba(20, 47, 81, 0.16);
      padding: 22px 20px 18px;
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .sheet h3 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .sheet-close {
      border: 0;
      background: transparent;
      font-size: 14px;
      font-weight: 900;
      color: var(--teal);
      cursor: pointer;
    }

    .menu-grid {
      display: grid;
      gap: 12px;
    }

    .menu-row {
      display: grid;
      grid-template-columns: 66px 1fr;
      gap: 14px;
      align-items: center;
    }

    .menu-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
    }

    .link-row {
      appearance: none;
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 0;
      font: inherit;
      cursor: pointer;
    }

    .subtle {
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.45;
    }

    .empty {
      text-align: center;
      color: var(--ink-soft);
      font-size: 13px;
      padding: 24px 12px;
    }

    @media (max-width: 460px) {
      body {
        padding: 10px;
      }

      .device-shell {
        width: 100%;
        padding: 12px;
        border-radius: 34px;
      }

      .screen {
        height: calc(100vh - 44px);
        min-height: 680px;
      }

      .shortcut-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="device-shell">
    <div class="notch"></div>
    <section class="screen">
      <div class="statusbar">
        <span id="phone-time">09.24</span>
        <span>📶  📡  95%</span>
      </div>
      <div class="screen-body" id="screen-body"></div>
      <nav class="tabbar" id="tabbar"></nav>
      <div class="overlay" id="overlay"></div>
    </section>
  </main>

  <script>
    const menuItems = [
      { id: "attendance", title: "Absensi", emoji: "👤", bg: "#FFF1D6", color: "#7A4E16" },
      { id: "approval", title: "Approval", emoji: "📋", bg: "#F1E8FF", color: "#7C3AED" },
      { id: "asset", title: "Aset", emoji: "🗂", bg: "#FFE8EC", color: "#B42318" },
      { id: "leave", title: "Izin", emoji: "👜", bg: "#FDE7F3", color: "#AE1972" },
      { id: "report", title: "Laporan Kehadiran", emoji: "📄", bg: "#FFE8E1", color: "#B3470D" },
      { id: "roster", title: "Roster", emoji: "🚪", bg: "#E0F2FE", color: "#1D4ED8" },
      { id: "payslip", title: "Slip Gaji", emoji: "💵", bg: "#E7F7FA", color: "#2AA6BA" },
      { id: "skill", title: "Skill Inventory", emoji: "🧠", bg: "#E0F7FF", color: "#0E7490" },
      { id: "project", title: "Project Marketplace", emoji: "🧩", bg: "#F0EBFF", color: "#8B5CF6" },
      { id: "ai", title: "AI HR Assistant", emoji: "✨", bg: "#EAF1FF", color: "#4F80E1" }
    ];

    const tabs = [
      { id: "home", label: "Beranda", icon: "⌂" },
      { id: "account", label: "Akun", icon: "◉" },
      { id: "settings", label: "Pengaturan", icon: "⚙" },
      { id: "messages", label: "Pesan", icon: "✉" },
      { id: "logout", label: "Log Out", icon: "⇥" }
    ];

    let currentScreen = "login";
    let lastTab = "home";

    const screenBody = document.getElementById("screen-body");
    const overlay = document.getElementById("overlay");
    const tabbar = document.getElementById("tabbar");

    function shortcutButton(item) {
      return `
        <button class="shortcut" data-open="${item.id}">
          <span class="shortcut-badge" style="background:${item.bg}; color:${item.color};">${item.emoji}</span>
          <span>${item.title}</span>
        </button>
      `;
    }

    const screenMap = {
      login: renderLogin,
      home: renderHome,
      account: renderAccount,
      settings: renderSettings,
      messages: renderMessages,
      attendance: renderAttendance,
      approval: renderApproval,
      asset: renderAsset,
      leave: renderLeave,
      report: renderReport,
      roster: renderRoster,
      payslip: renderPayslip,
      skill: renderSkill,
      project: renderProject,
      ai: renderAI
    };

    function renderTabbar() {
      tabbar.classList.toggle("hidden", currentScreen === "login");
      if (currentScreen === "login") return;

      tabbar.innerHTML = tabs.map((tab) => {
        const active = (tab.id === lastTab && ["home", "account", "settings", "messages"].includes(currentScreen))
          ? tab.id === currentScreen
          : tab.id === lastTab && currentScreen !== "login";

        const tabActive = currentScreen === tab.id || (tab.id === lastTab && !["home", "account", "settings", "messages", "login"].includes(currentScreen));

        return `
          <button class="tab ${tabActive ? "active" : ""}" data-tab="${tab.id}">
            <span class="tab-icon">${tab.icon}</span>
            <span>${tab.label}</span>
          </button>
        `;
      }).join("");

      tabbar.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          const target = button.dataset.tab;
          if (target === "logout") {
            setScreen("login");
            return;
          }
          lastTab = target;
          setScreen(target);
        });
      });
    }

    function setScreen(id) {
      currentScreen = id;
      if (["home", "account", "settings", "messages"].includes(id)) {
        lastTab = id;
      }
      overlay.classList.remove("active");
      overlay.innerHTML = "";
      screenBody.innerHTML = screenMap[id]();
      bindActions();
      renderTabbar();
      screenBody.scrollTop = 0;
    }

    function openMenuSheet() {
      overlay.innerHTML = `
        <div class="sheet">
          <div class="sheet-head">
            <h3>Semua Menu</h3>
            <button class="sheet-close" data-close-sheet>TUTUP</button>
          </div>
          <div class="menu-grid">
            ${menuItems.map((item) => `
              <button class="link-row menu-row" data-open="${item.id}">
                <span class="shortcut-badge" style="background:${item.bg}; color:${item.color};">${item.emoji}</span>
                <span class="menu-label">${item.title}</span>
              </button>
            `).join("")}
          </div>
        </div>
      `;
      overlay.classList.add("active");
      bindActions();
    }

    function bindActions() {
      screenBody.querySelectorAll("[data-open]").forEach((button) => {
        button.addEventListener("click", () => setScreen(button.dataset.open));
      });

      const openMenu = screenBody.querySelector("[data-open-menu]");
      if (openMenu) openMenu.addEventListener("click", openMenuSheet);

      const loginBtn = screenBody.querySelector("[data-login]");
      if (loginBtn) loginBtn.addEventListener("click", () => setScreen("home"));

      overlay.querySelectorAll("[data-open]").forEach((button) => {
        button.addEventListener("click", () => setScreen(button.dataset.open));
      });

      const closeSheet = overlay.querySelector("[data-close-sheet]");
      if (closeSheet) closeSheet.addEventListener("click", () => {
        overlay.classList.remove("active");
        overlay.innerHTML = "";
      });
    }

    function renderLogin() {
      return `
        <div class="stack">
          <div class="hero">
            <small>Welcome back</small>
            <h1>One People</h1>
            <p>Masuk ke akun Anda untuk mengakses attendance, approval, payroll, dan layanan HR internal PT. Ekozer.</p>
          </div>
          <div class="card stack">
            <div>
              <div class="screen-title" style="font-size:28px;">Login</div>
              <div class="subtle">Atur server dulu, lalu masuk dengan username dan password.</div>
            </div>
            <div class="server-card">
              <div class="server-head">
                <span>Pengaturan Server</span>
                <span>▾</span>
              </div>
              <div class="server-note">Server aktif: <strong>https://hcm.ekozer.com</strong></div>
            </div>
            <div class="field">Username: eko.ardianto</div>
            <div class="field">Password: ••••••••••</div>
            <button class="primary-btn" data-login>Masuk ke One People</button>
          </div>
          <div class="card">
            <strong style="display:block; margin-bottom:6px;">Server Tersimpan</strong>
            <span class="subtle">https://hcm.ekozer.com</span>
          </div>
        </div>
      `;
    }

    function renderHome() {
      return `
        <div class="hero">
          <small>Selamat Pagi</small>
          <h1>Eko Ardianto</h1>
          <div class="identity">
            <div>
              <p>IT Support Officer - 0000000583</p>
            </div>
            <div class="avatar">👤</div>
          </div>
        </div>
        <div class="card check-card">
          <div>
            <strong style="display:block; font-size:14px;">Check In</strong>
            <span style="color:var(--danger); font-size:13px;">Belum Check In Hari ini</span>
          </div>
          <button class="primary-btn" data-open="attendance">CHECK IN</button>
        </div>
        <div class="shortcut-grid">
          ${shortcutButton(menuItems[0])}
          ${shortcutButton(menuItems[3])}
          ${shortcutButton(menuItems[4])}
          ${shortcutButton(menuItems[9])}
        </div>
        <button class="secondary-btn" style="margin-top:14px;" data-open-menu>Semua Menu</button>
        <div class="banner" style="margin-top:16px;">
          <h3>Important</h3>
          <p>Area pengumuman internal, update operasional, dan informasi HR penting untuk seluruh karyawan.</p>
        </div>
        <div class="card" style="margin-top:14px;">
          <strong style="display:block; margin-bottom:10px;">Pengumuman</strong>
          <span class="subtle">Belum ada pengumuman baru hari ini.</span>
        </div>
      `;
    }

    function renderAccount() {
      return `
        <div class="hero">
          <small>Profil Akun</small>
          <h1>Eko Ardianto</h1>
          <p>IT Support Officer - 0000000583</p>
        </div>
        <div class="card" style="margin-top:16px;">
          <div class="list-line"><b>Data Pribadi</b><span>›</span></div>
          <div class="list-line"><b>Data Perusahaan</b><span>›</span></div>
          <div class="list-line"><b>Alamat</b><span>›</span></div>
          <div class="list-line"><b>Kontak Darurat</b><span>›</span></div>
